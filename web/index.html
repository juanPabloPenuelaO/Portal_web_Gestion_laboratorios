<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GILIH — Iniciar sesión</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-card-header">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          <path d="M9 12l2 2 4-4"></path>
        </svg>
      </div>
      <div class="auth-brand">GILIH</div>
    </div>

    <div class="auth-card-body">
      <h1 class="auth-title">Bienvenido a GILIH</h1>
      <p class="auth-subtitle">Inicia sesión con tus credenciales institucionales</p>

      <div id="alert" class="alert alert-error hidden"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Correo institucional</label>
          <div class="input-icon">
            <span class="input-icon-left">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                <path d="m22 7-10 6L2 7"></path>
              </svg>
            </span>
            <input type="email" id="email" name="email" placeholder="correo@cue.edu.co" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="contrasena">Contraseña</label>
          <div class="input-icon">
            <span class="input-icon-left">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </span>
            <input type="password" id="contrasena" name="contrasena" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="input-icon-right" id="togglePass" aria-label="Mostrar contraseña">
              <svg id="iconEye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <a class="auth-link auth-link-right" id="linkForgot">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn btn-auth btn-auth-primary" id="btnLogin">Iniciar sesión</button>
      </form>
      <!-- Botón de registro eliminado -->
    </div>

    <div class="auth-footer">GILIH v1.0 · CUE &copy; 2026</div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (Auth.getSession()) {
      window.location.href = 'app.html';
    }

    const form = document.getElementById('loginForm');
    const alertBox = document.getElementById('alert');
    const btnLogin = document.getElementById('btnLogin');

    function mostrarAlerta(mensaje, tipo) {
      alertBox.className = `alert alert-${tipo}`;
      alertBox.textContent = mensaje;
      alertBox.classList.remove('hidden');
    }

    const togglePass = document.getElementById('togglePass');
    const inputPass = document.getElementById('contrasena');
    const iconEye = document.getElementById('iconEye');

    togglePass.addEventListener('click', () => {
      const visible = inputPass.type === 'text';
      inputPass.type = visible ? 'password' : 'text';
      togglePass.setAttribute('aria-label', visible ? 'Mostrar contraseña' : 'Ocultar contraseña');
      iconEye.innerHTML = visible
        ? '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="3"></circle>'
        : '<path d="M9.9 4.2A9.1 9.1 0 0 1 12 4c6.5 0 10 7 10 7a13.2 13.2 0 0 1-2.2 2.9"></path><path d="M6.6 6.6A13.2 13.2 0 0 0 2 11s3.5 7 10 7a9 9 0 0 0 3.4-.7"></path><path d="m2 2 20 20"></path>';
    });

    document.getElementById('linkForgot').addEventListener('click', () => {
      mostrarAlerta('Para restablecer tu contraseña, contacta al administrador del sistema.', 'info');
    });

    // Eliminada la lógica del botón de registro

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.classList.add('hidden');
      btnLogin.disabled = true;
      btnLogin.textContent = 'Ingresando...';

      try {
        await Auth.login(
          document.getElementById('email').value.trim(),
          inputPass.value
        );
        window.location.href = 'app.html';
      } catch (err) {
        mostrarAlerta(err.message || 'Credenciales inválidas', 'error');
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = 'Iniciar sesión';
      }
    });
  </script>
</body>
</html>
