<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GILIH — Iniciar sesión</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <h1>GILIH</h1>
      <p>Gestión Integral de Laboratorios de Ingeniería</p>
      <p style="margin-top:0.5rem;font-size:0.8rem;">Universidad Alexander Von Humboldt</p>
    </div>

    <div id="alert" class="alert alert-error hidden"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Correo institucional</label>
        <input type="email" id="email" name="email" placeholder="usuario@institucion.edu" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" name="contrasena" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="btnLogin">Iniciar sesión</button>
    </form>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (Auth.getSession()) {
      window.location.href = 'app.html';
    }

    const form = document.getElementById('loginForm');
    const alert = document.getElementById('alert');
    const btnLogin = document.getElementById('btnLogin');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alert.classList.add('hidden');
      btnLogin.disabled = true;
      btnLogin.textContent = 'Ingresando...';

      try {
        await Auth.login(
          document.getElementById('email').value.trim(),
          document.getElementById('contrasena').value
        );
        window.location.href = 'app.html';
      } catch (err) {
        alert.textContent = err.message || 'Credenciales inválidas';
        alert.classList.remove('hidden');
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = 'Iniciar sesión';
      }
    });
  </script>
</body>
</html>
